name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      # Ignoramos los artefactos que este mismo workflow commitea al final,
      # para no entrar en bucle.
      - 'cards.json'
      - 'web/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Generar cards.json
        run: |
          find cartas -type f -name "*.png" | sort | python3 -c "
          import sys, json
          paths = [line.strip() for line in sys.stdin if line.strip()]
          print(json.dumps(paths, indent=2, ensure_ascii=False))
          " > cards.json

      - name: Instalar ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Generar WebP para cartas nuevas o modificadas
        run: |
          # PNGs modificados en este push (ignorar error si HEAD~1 no existe)
          changed=$(git diff --name-only HEAD~1 HEAD 2>/dev/null \
            | grep -E '^cartas/.*\.png$' || true)

          # PNGs sin WebP asociado
          missing=$(find cartas -name "*.png" -type f | while IFS= read -r src; do
            out="web/${src#cartas/}"
            out="${out%.png}.webp"
            if [ ! -f "$out" ]; then echo "$src"; fi
          done || true)

          # Unir, deduplicar y quitar líneas vacías (sed no falla si no hay match)
          to_process=$(printf '%s\n%s\n' "$changed" "$missing" \
            | sort -u | sed '/^[[:space:]]*$/d')

          if [ -z "$to_process" ]; then
            echo "No hay imágenes que procesar."
          else
            count=$(printf '%s\n' "$to_process" | wc -l)
            echo "$count imagen(es) a procesar."
            printf '%s\n' "$to_process" | while IFS= read -r src; do
              [ -z "$src" ] && continue
              rel="${src#cartas/}"
              out="web/${rel%.png}.webp"
              mkdir -p "$(dirname "$out")"
              convert "$src" -resize '600x>' -quality 82 \
                -define webp:lossless=false "$out"
              echo "✓ $out"
            done
          fi

          # Eliminar WebP huérfanos (cartas borradas)
          find web -name "*.webp" -type f | while IFS= read -r webp; do
            original="cartas/${webp#web/}"
            original="${original%.webp}.png"
            if [ ! -f "$original" ]; then
              rm "$webp"
              echo "✗ borrado huérfano: $webp"
            fi
          done

      - name: Preparar carpeta de despliegue
        run: |
          mkdir _site
          rsync -a \
            --exclude='cartas/' \
            --exclude='.github/' \
            --exclude='.git/' \
            --exclude='_site/' \
            . _site/
          echo "Tamaño del artefacto: $(du -sh _site | cut -f1)"

      - uses: actions/configure-pages@v5

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v5

      # Tras un deploy exitoso, persistimos cards.json y los WebP para que el
      # siguiente run no tenga que regenerarlos. Este commit NO redispara el
      # workflow gracias al paths-ignore de arriba.
      - name: Persistir cards.json y WebP generados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards.json web/
          if git diff --staged --quiet; then
            echo "Sin cambios que persistir."
          else
            git commit -m "chore: actualizar catálogo y WebP optimizados"
            git push
          fi
